version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: oj_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ojdb}
      POSTGRES_USER: ${POSTGRES_USER:-ojuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ojpassword}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ojuser} -d ${POSTGRES_DB:-ojdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - oj_network

  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: oj_web
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

      compiler:
        condition: service_started

    ports:
      - "8000:8000"

    volumes:
      - static_volume:/app/staticfiles

    command: >
      sh -c " python manage.py migrate && python manage.py collectstatic --noinput && gunicorn oj.wsgi:application --bind 0.0.0.0:8000 --workers 3 "

    networks:
      - oj_network

  compiler:
    build:
      context: ./compiler_service
      dockerfile: Dockerfile

    container_name: oj_compiler
    restart: unless-stopped

    ports:
      - "8001:8001"

    networks:
      - oj_network

    security_opt:
      - no-new-privileges:true

    read_only: false

    tmpfs:
      - /tmp

    environment:
      PYTHONUNBUFFERED: 1

volumes:
  postgres_data:
  static_volume:

networks:
  oj_network:
    driver: bridge
